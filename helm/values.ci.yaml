# CI-specific Helm overrides – applied on top of helm/values.prod.yaml.
#
# Differences from prod:
#   - executor: LocalExecutor  → tasks run inside the scheduler process;
#     no worker pods, no extra RBAC, much simpler on kind.
#   - pullPolicy: Never  → use the image pre-loaded into the kind node.
#   - logs.persistence disabled + existingClaim cleared → kind's local-path
#     provisioner only supports ReadWriteOnce, and the logs PVC from prod
#     (my-logs-pvc) doesn't exist here.
#   - Slimmer resource requests so all pods fit on a single kind node (7 GB).

executor: LocalExecutor

images:
  airflow:
    pullPolicy: Never

logs:
  persistence:
    enabled: false
    existingClaim: ""

# One replica per component is enough for CI smoke-tests.
scheduler:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

dagProcessor:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

apiServer:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

triggerer:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

# Ensure the bundled sub-charts use the pre-loaded kind images (no registry pull)
statsd:
  image:
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

postgresql:
  image:
    pullPolicy: IfNotPresent
  primary:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
