# CI-specific Helm overrides – applied on top of helm/values.prod.yaml.
#
# Differences from prod:
#   - pullPolicy: Never  → use the image pre-loaded into the kind node; no
#     registry pull required.
#   - logs.persistence disabled → kind's built-in local-path provisioner only
#     supports ReadWriteOnce; since multiple Airflow components would all need
#     to mount the same volume (ReadWriteMany) we simply turn persistence off
#     for CI.  The test_logs_pvc_is_bound test is excluded via pytest -k.
#   - Slimmer resource requests so all pods fit on a single kind node running
#     inside a GitHub Actions runner (7 GB RAM total).

images:
  airflow:
    pullPolicy: Never

logs:
  persistence:
    enabled: false

# One replica per component is enough for CI smoke-tests.
scheduler:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

dagProcessor:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

apiServer:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

triggerer:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

statsd:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

postgresql:
  primary:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
