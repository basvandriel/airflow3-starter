# CI-specific Helm overrides – applied on top of helm/values.prod.yaml.
#
# Differences from prod:
#   - executor: LocalExecutor  → tasks run inside the scheduler process;
#     no worker pods, no extra RBAC, much simpler on kind.
#   - pullPolicy: Never  → use the image pre-loaded into the kind node.
#   - logs.persistence disabled + existingClaim cleared → kind's local-path
#     provisioner only supports ReadWriteOnce, and the logs PVC from prod
#     (my-logs-pvc) doesn't exist here.
#   - Slimmer resource requests so all pods fit on a single kind node (7 GB).

executor: LocalExecutor

# Give the migration job more CPU so Alembic finishes faster.
# It runs sequentially before any other pod can start, so this directly
# reduces the overall helm --wait time.
#
# WHY double migrate?  On a completely fresh database, `airflow db migrate`
# takes the create_db_from_orm → initdb code path, which initialises the core
# Airflow tables but does NOT create the FAB-specific `alembic_version_fab`
# table.  A second `airflow db migrate` detects the now-existing core tables,
# switches to the upgradedb path, and runs the FAB provider alembic migrations
# (e.g. 6709f7a774b9 "Create User and Role tables if missing"), which stamps
# `alembic_version_fab`.  Without that table, `airflow db check-migrations`
# (run by the wait-for-airflow-migrations init container) always returns False
# and every pod stays stuck in Init forever.
migrateDatabaseJob:
  command:
    - bash
    - -c
    - |
      airflow db migrate && airflow db migrate
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 512Mi

# Extend the init-container wait timeout for migrations.
# Default is 60s which is too short on a constrained kind node.
images:
  airflow:
    pullPolicy: Never
  migrationsWaitTimeout: 300

logs:
  persistence:
    enabled: false
    existingClaim: ""

# One replica per component is enough for CI smoke-tests.
scheduler:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

dagProcessor:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi

apiServer:
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi