# Custom values for the official Apache Airflow Helm chart
# See https://airflow.apache.org/docs/helm-chart/stable/index.html for full
# documentation of all options.

# Use the same Airflow version we built in Dockerfile.
image:
  repository: apache/airflow
  tag: "3.1.7"
  pullPolicy: IfNotPresent

# DAG configuration: disable built-in persistence/gitSync so that we can
# mount an external volume (PVC) containing the dags directory.
dags:
  mountPath: "/opt/airflow/dags"
  persistence:
    enabled: false
  gitSync:
    enabled: false

# use a PVC to provide the dags tree; create the claim before installing the
# chart (example manifest is shown in comments below).
volumes:
  - name: dags
    persistentVolumeClaim:
      claimName: my-dags-pvc        # adjust to your actual PVC name

volumeMounts:
  - name: dags
    mountPath: /opt/airflow/dags

# Instead of managing a ConfigMap you can also tell the chart to pull your
# repository (or a DAG-specific repo) via git-sync or mount a PVC.  That way the
# entire `dags/` subtree including subpackages like `utils/` will appear on the
# filesystem and imports work naturally.
#
# Example using git-sync:
# dags:
#   gitSync:
#     enabled: true
#     repo: https://github.com/basvandriel/airflow3-starter.git
#     branch: main
#     rev: HEAD
#     subPath: "dags"               # or "" to use repo root
#     # you can also configure knownHosts, sshKeySecret, etc.
#
# Example using a PV:
# volumes:
#   - name: dags-pvc
#     persistentVolumeClaim:
#       claimName: my-dags-claim
# volumeMounts:
#   - name: dags-pvc
#     mountPath: /opt/airflow/dags
#
# (leave these commented out when using the configmap method described earlier)

# Extra environment variables
env:
  - name: AIRFLOW__CORE__DAGS_FOLDER
    value: "/opt/airflow/dags"

# Feel free to add extraPipPackages, resources, etc. as needed.
