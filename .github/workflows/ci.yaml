name: CI – kind deploy & test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  deploy-and-test:
    name: Build → kind deploy → pytest
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      IMAGE_REPO: airflow3-starter
      IMAGE_TAG: ci
      KIND_CLUSTER: airflow-ci
      CHART_NAME: ci-airflow
      NAMESPACE: airflow-ci

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Build custom Airflow image ──────────────────────────────────────────
      - name: Build Docker image
        run: docker build --tag $IMAGE_REPO:$IMAGE_TAG .

      # ── Spin up a temporary kind cluster ───────────────────────────────────
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ${{ env.KIND_CLUSTER }}

      # ── Make the locally-built image available inside kind ──────────────────
      - name: Load image into kind nodes
        run: kind load docker-image $IMAGE_REPO:$IMAGE_TAG --name $KIND_CLUSTER

      # ── Helm setup ──────────────────────────────────────────────────────────
      - name: Add Apache Airflow Helm repo
        run: |
          helm repo add apache-airflow https://airflow.apache.org
          helm repo update

      # ── Background pod watcher – prints events every 30 s while helm waits ──
      - name: Watch pods (background)
        run: |
          while true; do
            echo "── $(date -u +%H:%M:%S) pod status ──────────────────────────────"
            kubectl get pods -n $NAMESPACE -o wide 2>/dev/null || true
            kubectl get events -n $NAMESPACE --sort-by=.lastTimestamp 2>/dev/null | tail -20 || true
            sleep 30
          done &

      # ── Deploy Airflow ───────────────────────────────────────────────────────
      # Uses values.prod.yaml (DAGs baked in, no dags-PVC) overridden by
      # values.ci.yaml (LocalExecutor, pullPolicy: Never, logs persistence off).
      - name: Deploy Airflow via Helm
        run: |
          helm upgrade --install $CHART_NAME apache-airflow/airflow \
            --namespace $NAMESPACE --create-namespace \
            --values helm/values.prod.yaml \
            --values helm/values.ci.yaml \
            --set defaultAirflowRepository=$IMAGE_REPO \
            --set defaultAirflowTag=$IMAGE_TAG \
            --timeout 2m \
            --wait

      # ── Show pod state for debugging if something went wrong ────────────────
      - name: Describe pods (always)
        if: always()
        run: kubectl get pods -n $NAMESPACE -o wide

      # ── Python / uv setup ───────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install test dependencies
        run: uv sync --group dev

      # ── Run deployment tests ─────────────────────────────────────────────────
      # Exclusions:
      #   test_logs_pvc_is_bound       – log PVC intentionally disabled in CI
      #                                  (kind's local-path doesn't support RWM)
      #   test_e2e_hello_world         – needs KubernetesExecutor to schedule task
      #                                  pods, which requires extra RBAC setup in
      #                                  kind; guard is already a --e2e flag skip
      - name: Run pytest
        run: |
          uv run pytest tests/ \
            --namespace $NAMESPACE \
            --chart-name $CHART_NAME \
            --expect-custom-image \
            -k "not test_logs_pvc_is_bound and not test_e2e_hello_world" \
            -v

      # ── Collect logs on failure ──────────────────────────────────────────────
      - name: Dump pod logs on failure
        if: failure()
        run: |
          echo "=== Pod list ==="
          kubectl get pods -n $NAMESPACE -o wide

          for pod in $(kubectl get pods -n $NAMESPACE -o jsonpath='{.items[*].metadata.name}'); do
            echo ""
            echo "=== Logs: $pod ==="
            kubectl logs "$pod" -n $NAMESPACE --all-containers --tail=100 || true
          done
